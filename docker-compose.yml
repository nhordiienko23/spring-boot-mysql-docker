version: '3.8'

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql_spring_container
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=spring_database
      - MYSQL_USER=nikita_user
      - MYSQL_PASSWORD=nikita_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: